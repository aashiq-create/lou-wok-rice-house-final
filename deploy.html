function req(method,url,tok,body){
  return new Promise(function(res,rej){
    var r=new XMLHttpRequest();

    r.setRequestHeader('Authorization','token '+tok);

    if(body)r.setRequestHeader('Content-Type','application/json');
    r.timeout=60000;

      if(r.status>=200&&r.status<300){try{res(JSON.parse(r.responseText));}catch(e){res({});}}
      else{
        var msg='HTTP '+r.status;
        try{msg=JSON.parse(r.responseText).message||msg;}catch(e){}
        if(r.status===401)msg='Token invalid or expired — go to github.com/settings/tokens and regenerate it';
        if(r.status===403)msg='Token missing repo permission — regenerate token with repo scope checked';
        if(r.status===404)msg='File not found — check the repo name is correct';
        if(r.status===422)msg='Unprocessable — SHA mismatch, try again';
        rej(new Error(msg));
      }
    };
    r.onerror=function(){rej(new Error('Network error — check your internet connection and try again'));};
    r.ontimeout=function(){rej(new Error('Request timed out — check your connection and retry'));};
    r.send(body?JSON.stringify(body):null);

  if(se){se.textContent='uploading...';se.style.color='#e8a020';}
  log('Getting current SHA: '+file.name+'...');
  var sha=await getSHA(tok,file.name);
  log('Uploading: '+file.name+'...');
  var body={
    message:'Deploy '+file.name+' via Lou Wok tool - '+new Date().toLocaleString(),
    content:file.b64,
    branch:B
  };
  if(sha)body.sha=sha;
  var result=await req('PUT','https://api.github.com/repos/'+O+'/'+R+'/contents/'+file.name,tok,body);
  var cs=result.commit&&result.commit.sha?result.commit.sha.slice(0,8):'done';
  if(se){se.textContent='pushed '+cs;se.style.color='#4caf50';}
  log('Done: '+file.name+' (commit '+cs+')','ok');
}
async function deploy(){
  var tok=(document.getElementById('tok').value||'').trim();
  if(!tok){alert('Please paste your GitHub Personal Access Token first.');return;}
  var btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='Deploying...';
  document.getElementById('log').innerHTML='';
  var se_a=document.getElementById('st-a'),se_i=document.getElementById('st-i');
  if(se_a){se_a.textContent='pending...';se_a.style.color='#e8a020';}
  if(se_i){se_i.textContent='pending...';se_i.style.color='#e8a020';}
  try{
    prog(5);
    log('Verifying GitHub token...');
    var user=await req('GET','https://api.github.com/user',tok);
    log('Authenticated as: @'+user.login,'ok');
    log('Target: '+O+'/'+R+' on branch '+B);
    log('');
    for(var i=0;i<FILES.length;i++){
      log('--- '+FILES[i].name+' ---');
      await pushFile(tok,FILES[i]);
      prog(20+(i+1)/FILES.length*75);
      log('');
    }
    prog(100);
    log('ALL FILES DEPLOYED SUCCESSFULLY','ok');
    log('Vercel is building now...','ok');
    log('louwok.com will be live in ~30 seconds','ok');
    log('Go to louwok.com/admin to sign in','ok');
    btn.textContent='Done — Deployed!';
    btn.style.background='#2d7a3a';
  }catch(e){
    log('ERROR: '+e.message,'er');
    if(se_a&&se_a.textContent==='pending...')se_a.textContent='failed';
    if(se_i&&se_i.textContent==='pending...')se_i.textContent='failed';
    btn.disabled=false;
    btn.textContent='Retry Deploy';
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('tok')===document.activeElement)deploy();
});
</script>
